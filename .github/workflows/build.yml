name: Build dfxtwitch plugin (Windows)

# Builds dfxtwitch.plug.dll against a pinned DFHack source checkout and
# attaches the artifact to a draft release on each git tag.
#
# Windows-only. Uses WinHTTP for HTTPS, so no vcpkg / libcurl needed.
#
# DFHack version targeted: see env.DFHACK_TAG below — pin to the release that
# matches the streamer's DF + DFHack install. Update on each DF/DFHack bump.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  # Pin to the DFHack release that matches the streamer's install.
  # Update on each DF/DFHack bump and re-tag the repo to rebuild artifacts.
  DFHACK_TAG: 53.12-r1

jobs:
  build:
    # Pinned to windows-2022 on purpose. DFHack's top-level CMakeLists requires
    # MSVC toolset 14.30..14.44 (VS 2022). The `windows-latest` image now ships
    # VS 18 / MSVC 14.50, which DFHack rejects at configure time with:
    #   "MSVC 2022 version 1930 to 1944 is required, Version Found: 1950"
    # Bump this only when DFHack relaxes that range.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          path: mod
          submodules: recursive

      - name: Checkout DFHack
        uses: actions/checkout@v4
        with:
          repository: DFHack/dfhack
          ref: ${{ env.DFHACK_TAG }}
          submodules: recursive
          path: dfhack

      # Drop our plugin into dfhack/plugins/dfxtwitch
      - name: Stage plugin into DFHack tree
        shell: bash
        run: |
          cp -r mod/dev dfhack/plugins/dfxtwitch
          echo 'add_subdirectory(dfxtwitch)' >> dfhack/plugins/CMakeLists.txt

      - name: Vendor nlohmann/json
        shell: bash
        run: |
          mkdir -p dfhack/plugins/dfxtwitch/third_party/nlohmann
          curl -L -o dfhack/plugins/dfxtwitch/third_party/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp

      - name: Set up MSVC env (x64) + Ninja
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          # Belt-and-braces: even on windows-2022, force VS 2022 in case a
          # future image installs VS 18 side-by-side. DFHack requires MSVC
          # toolset 14.30..14.44.
          vsversion: 2022

      # No Perl install step on purpose. DFHack's own Windows CI workflow
      # (DFHack/dfhack `.github/workflows/build-windows.yml`, identical at
      # `master` and the `53.12-r1` tag we pin) has *no* Perl install step:
      # it relies entirely on the windows-2022 runner image's preinstalled
      # Strawberry Perl, which already bundles XML::LibXML + XML::LibXSLT
      # for codegen. Every cpanm/choco workaround we tried in rc3..rc6 was
      # invoking machinery the upstream project never invokes — and was the
      # *only* thing failing. The verify step below is a fast-fail tripwire
      # so a future image change surfaces *here* with a clear message rather
      # than 30s later mid-codegen.
      # IMPORTANT: shell: cmd, not bash. `shell: bash` on Windows uses Git for
      # Windows' bundled /usr/bin/perl, which shadows Strawberry on PATH and
      # has none of the CPAN modules — that's what made rc7's verify fail
      # (and is what was actually misleading us in rc3..rc5: every cpanm/perl
      # invocation under shell: bash was running Git's perl, not Strawberry's).
      # CMake spawns perl via cmd.exe, which uses the system PATH and finds
      # Strawberry — same environment we use here, so this verify proves the
      # exact perl that codegen will use can load the modules. `where perl`
      # is kept as diagnostic in case the runner image's PATH order ever
      # changes.
      - name: Verify preinstalled Perl XML modules (DFHack codegen)
        shell: cmd
        run: |
          where perl
          perl -V:version
          perl -MXML::LibXML  -e "print 'XML::LibXML  ', XML::LibXML->VERSION,  qq(\n)"
          perl -MXML::LibXSLT -e "print 'XML::LibXSLT ', XML::LibXSLT->VERSION, qq(\n)"

      - name: Configure
        working-directory: dfhack
        shell: cmd
        run: |
          cmake -B build -G Ninja -DBUILD_PLUGINS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build dfxtwitch
        working-directory: dfhack
        shell: cmd
        run: |
          cmake --build build --target dfxtwitch --config Release

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p out
          find dfhack/build -name 'dfxtwitch.plug.*' -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: dfxtwitch-windows
          path: out/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
