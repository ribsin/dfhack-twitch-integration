name: Build dfxtwitch plugin (Windows)

# Builds dfxtwitch.plug.dll against a pinned DFHack source checkout and
# attaches the artifact to a draft release on each git tag.
#
# Windows-only. Uses WinHTTP for HTTPS, so no vcpkg / libcurl needed.
#
# DFHack version targeted: see env.DFHACK_TAG below — pin to the release that
# matches the streamer's DF + DFHack install. Update on each DF/DFHack bump.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  # Pin to the DFHack release that matches the streamer's install.
  # Update on each DF/DFHack bump and re-tag the repo to rebuild artifacts.
  DFHACK_TAG: 53.12-r1

jobs:
  build:
    # Pinned to windows-2022 on purpose. DFHack's top-level CMakeLists requires
    # MSVC toolset 14.30..14.44 (VS 2022). The `windows-latest` image now ships
    # VS 18 / MSVC 14.50, which DFHack rejects at configure time with:
    #   "MSVC 2022 version 1930 to 1944 is required, Version Found: 1950"
    # Bump this only when DFHack relaxes that range.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          path: mod
          submodules: recursive

      - name: Checkout DFHack
        uses: actions/checkout@v4
        with:
          repository: DFHack/dfhack
          ref: ${{ env.DFHACK_TAG }}
          submodules: recursive
          path: dfhack

      # Drop our plugin into dfhack/plugins/dfxtwitch
      - name: Stage plugin into DFHack tree
        shell: bash
        run: |
          cp -r mod/dev dfhack/plugins/dfxtwitch
          echo 'add_subdirectory(dfxtwitch)' >> dfhack/plugins/CMakeLists.txt

      - name: Vendor nlohmann/json
        shell: bash
        run: |
          mkdir -p dfhack/plugins/dfxtwitch/third_party/nlohmann
          curl -L -o dfhack/plugins/dfxtwitch/third_party/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp

      - name: Set up MSVC env (x64) + Ninja
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          # Belt-and-braces: even on windows-2022, force VS 2022 in case a
          # future image installs VS 18 side-by-side. DFHack requires MSVC
          # toolset 14.30..14.44.
          vsversion: 2022

      # Pin our own Strawberry Perl. The Perl that ships on the windows-2022
      # image (currently Strawberry 5.42) has a fatpacked `cpanm` that's
      # incompatible with the modern ExtUtils::MakeMaker it pulls in:
      #   "Attempt to call undefined import method ... via package
      #    CPAN::Meta::Prereqs"
      # …and it lacks ExtUtils::Manifest, so MakeMaker's Configure step also
      # dies with "Can't locate ExtUtils/Manifest.pm in @INC". A clean,
      # version-pinned Strawberry sidesteps both bugs.
      - name: Install Perl (pinned Strawberry)
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'
          distribution: strawberry

      - name: Install Perl XML modules (DFHack codegen)
        shell: bash
        # DFHack's codegen step needs XML::LibXML to chew library/xml.
        #
        # We pre-install ExtUtils::MakeMaker's *deps* (Pod::Man, etc.) before
        # the real install, to break a known cpanm circular-dependency trap:
        # if Alien::Libxml2 / XML::LibXML triggers a MakeMaker upgrade, cpanm
        # Configures the new MakeMaker, then tries to install Pod::Man
        # (podlators), whose Makefile.PL bails because the *new* MakeMaker
        # isn't installed yet — cascading failure all the way back up. By
        # installing MakeMaker's deps via --installdeps first, the upgrade
        # path can complete without circling.
        #
        # Don't swallow failures here, and keep enough log context to
        # diagnose if the toolchain shifts again.
        run: |
          set -o pipefail
          cpanm --notest --installdeps ExtUtils::MakeMaker 2>&1 | tail -n 100
          cpanm --notest XML::LibXML XML::LibXSLT 2>&1 | tail -n 200

      - name: Configure
        working-directory: dfhack
        shell: cmd
        run: |
          cmake -B build -G Ninja -DBUILD_PLUGINS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build dfxtwitch
        working-directory: dfhack
        shell: cmd
        run: |
          cmake --build build --target dfxtwitch --config Release

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p out
          find dfhack/build -name 'dfxtwitch.plug.*' -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: dfxtwitch-windows
          path: out/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
