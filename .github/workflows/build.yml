name: Build dfxtwitch plugin (Windows)

# Builds dfxtwitch.plug.dll against a pinned DFHack source checkout and
# attaches the artifact to a draft release on each git tag.
#
# Windows-only. Uses WinHTTP for HTTPS, so no vcpkg / libcurl needed.
#
# DFHack version targeted: see env.DFHACK_TAG below — pin to the release that
# matches the streamer's DF + DFHack install. Update on each DF/DFHack bump.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  # Pin to the DFHack release that matches the streamer's install.
  # Update on each DF/DFHack bump and re-tag the repo to rebuild artifacts.
  DFHACK_TAG: 53.12-r1

jobs:
  build:
    # Pinned to windows-2022 on purpose. DFHack's top-level CMakeLists requires
    # MSVC toolset 14.30..14.44 (VS 2022). The `windows-latest` image now ships
    # VS 18 / MSVC 14.50, which DFHack rejects at configure time with:
    #   "MSVC 2022 version 1930 to 1944 is required, Version Found: 1950"
    # Bump this only when DFHack relaxes that range.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          path: mod
          submodules: recursive

      - name: Checkout DFHack
        uses: actions/checkout@v4
        with:
          repository: DFHack/dfhack
          ref: ${{ env.DFHACK_TAG }}
          submodules: recursive
          path: dfhack

      # Drop our plugin into dfhack/plugins/dfxtwitch
      - name: Stage plugin into DFHack tree
        shell: bash
        run: |
          cp -r mod/dev dfhack/plugins/dfxtwitch
          echo 'add_subdirectory(dfxtwitch)' >> dfhack/plugins/CMakeLists.txt

      - name: Vendor nlohmann/json
        shell: bash
        run: |
          mkdir -p dfhack/plugins/dfxtwitch/third_party/nlohmann
          curl -L -o dfhack/plugins/dfxtwitch/third_party/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp

      - name: Set up MSVC env (x64) + Ninja
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          # Belt-and-braces: even on windows-2022, force VS 2022 in case a
          # future image installs VS 18 side-by-side. DFHack requires MSVC
          # toolset 14.30..14.44.
          vsversion: 2022

      # Install the *full* Strawberry Perl 5.38 distribution via Chocolatey.
      # Strawberry's "Standard" distribution bundles XML::LibXML + XML::LibXSLT
      # *prebuilt* (along with ExtUtils::MakeMaker, ExtUtils::Manifest,
      # Pod::Man, and the Alien::Libxml2 chain). This skips cpanm entirely
      # and dodges every bug we hit in rc3..rc5:
      #   - rc3: image's broken fatpacked cpanm (CPAN::Meta::Prereqs error)
      #   - rc4: missing ExtUtils::Manifest in @INC
      #   - rc5: cpanm circular-resolution bailout when MakeMaker upgrade
      #          and Pod::Man install were both in flight
      # Pinned to 5.38.2.2 — the last 5.38 LTS-line release. --force
      # --allow-downgrade lets us replace the runner image's preinstalled
      # Strawberry 5.42 (which has the busted cpanm).
      - name: Install Strawberry Perl 5.38 (full distribution)
        shell: powershell
        run: |
          choco install strawberryperl `
            --version=5.38.2.2 -y --no-progress --force --allow-downgrade
          # Prepend our pinned Strawberry to PATH for the rest of the job.
          # Choco's package updates the *machine* PATH but Actions steps need
          # an explicit GITHUB_PATH bump to see it on this run.
          "C:\strawberry\c\bin"         | Add-Content -Path $env:GITHUB_PATH
          "C:\strawberry\perl\site\bin" | Add-Content -Path $env:GITHUB_PATH
          "C:\strawberry\perl\bin"      | Add-Content -Path $env:GITHUB_PATH

      - name: Verify Perl XML modules (DFHack codegen)
        shell: bash
        # Strawberry ships these prebuilt; if a future Strawberry drops them,
        # this step fails *here* with a clear message rather than two steps
        # later inside DFHack's codegen.
        run: |
          set -o pipefail
          perl -V:version
          perl -MXML::LibXML  -e "print 'XML::LibXML  ', XML::LibXML->VERSION,  qq(\n)"
          perl -MXML::LibXSLT -e "print 'XML::LibXSLT ', XML::LibXSLT->VERSION, qq(\n)"

      - name: Configure
        working-directory: dfhack
        shell: cmd
        run: |
          cmake -B build -G Ninja -DBUILD_PLUGINS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build dfxtwitch
        working-directory: dfhack
        shell: cmd
        run: |
          cmake --build build --target dfxtwitch --config Release

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p out
          find dfhack/build -name 'dfxtwitch.plug.*' -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: dfxtwitch-windows
          path: out/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
