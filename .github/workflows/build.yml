name: Build dfxtwitch plugin (Windows)

# Builds dfxtwitch.plug.dll against a pinned DFHack source checkout and
# attaches the artifact to a draft release on each git tag.
#
# Windows-only. Uses WinHTTP for HTTPS, so no vcpkg / libcurl needed.
#
# DFHack version targeted: see env.DFHACK_TAG below — pin to the release that
# matches the streamer's DF + DFHack install. Update on each DF/DFHack bump.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  # Pin to the DFHack release that matches the streamer's install.
  # Update on each DF/DFHack bump and re-tag the repo to rebuild artifacts.
  DFHACK_TAG: 53.12-r1

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: mod
          submodules: recursive

      - name: Checkout DFHack
        uses: actions/checkout@v4
        with:
          repository: DFHack/dfhack
          ref: ${{ env.DFHACK_TAG }}
          submodules: recursive
          path: dfhack

      # Drop our plugin into dfhack/plugins/dfxtwitch
      - name: Stage plugin into DFHack tree
        shell: bash
        run: |
          cp -r mod/dev dfhack/plugins/dfxtwitch
          echo 'add_subdirectory(dfxtwitch)' >> dfhack/plugins/CMakeLists.txt

      - name: Vendor nlohmann/json
        shell: bash
        run: |
          mkdir -p dfhack/plugins/dfxtwitch/third_party/nlohmann
          curl -L -o dfhack/plugins/dfxtwitch/third_party/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp

      - name: Set up MSVC env (x64) + Ninja
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Perl XML modules (DFHack codegen)
        shell: bash
        run: |
          cpanm --notest XML::LibXML XML::LibXSLT 2>&1 | tail -n 30 || true

      - name: Configure
        working-directory: dfhack
        shell: cmd
        run: |
          cmake -B build -G Ninja -DBUILD_PLUGINS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build dfxtwitch
        working-directory: dfhack
        shell: cmd
        run: |
          cmake --build build --target dfxtwitch --config Release

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p out
          find dfhack/build -name 'dfxtwitch.plug.*' -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: dfxtwitch-windows
          path: out/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
