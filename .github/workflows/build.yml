name: Build dfxtwitch plugin

# Builds dfxtwitch.plug.dll/.so against a pinned DFHack source checkout and
# attaches the artifacts to a draft release on each git tag.
#
# DFHack version targeted: see env.DFHACK_TAG below — pin to the release that
# matches the streamer's DF + DFHack install. Update on each DF/DFHack bump.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  DFHACK_TAG: master   # TODO: pin (e.g. 51.13-r1) once the streamer's DF version is known

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: mod
          submodules: recursive

      - name: Checkout DFHack
        uses: actions/checkout@v4
        with:
          repository: DFHack/dfhack
          ref: ${{ env.DFHACK_TAG }}
          submodules: recursive
          path: dfhack

      # Drop our plugin into dfhack/plugins/dfxtwitch
      - name: Stage plugin into DFHack tree
        shell: bash
        run: |
          cp -r mod/dev dfhack/plugins/dfxtwitch
          echo 'add_subdirectory(dfxtwitch)' >> dfhack/plugins/CMakeLists.txt

      - name: Vendor nlohmann/json
        shell: bash
        run: |
          mkdir -p dfhack/plugins/dfxtwitch/third_party/nlohmann
          curl -L -o dfhack/plugins/dfxtwitch/third_party/nlohmann/json.hpp \
            https://github.com/nlohmann/json/releases/latest/download/json.hpp

      - name: Install build deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libcurl4-openssl-dev \
            libxml-libxml-perl libxml-libxslt-perl

      - name: Install build deps (windows)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'master'

      - name: Configure
        working-directory: dfhack
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cmake -B build -G Ninja -DBUILD_PLUGINS=ON \
              -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
              -DVCPKG_TARGET_TRIPLET=x64-windows-static
          else
            cmake -B build -G Ninja -DBUILD_PLUGINS=ON
          fi

      - name: Build dfxtwitch
        working-directory: dfhack
        run: cmake --build build --target dfxtwitch --config Release

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p out
          find dfhack/build -name 'dfxtwitch.plug.*' -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: dfxtwitch-${{ matrix.os }}
          path: out/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
